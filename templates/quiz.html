<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coaching Business Strategy Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }

        .form-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .input-focus {
            outline: none;
            border-color: #6366f1;
            ring: 2px;
            ring-color: rgba(99, 102, 241, 0.2);
        }
    </style>
</head>

<body class="py-12 px-4 md:px-0">
    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Coaching Strategy Assessment</h1>
            <p class="text-xl text-gray-600">Complete the quiz and receive your personalized business plan snapshot by
                email.</p>
        </div>

        <form action="/submit-quiz" method="POST" class="form-card p-8 space-y-8">
            <!-- PERSONAL INFO -->
            <div class="grid md:grid-cols-2 gap-6 pb-6 border-b border-gray-100">
                <div>
                    <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">First Name</label>
                    <input type="text" id="name" name="name" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="Alex">
                </div>
                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="alex@example.com">
                </div>
            </div>

            <div class="space-y-8">
                <!-- Q1 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">1. What's your primary area of
                        expertise or experience?</label>
                    <input type="text" name="Q1" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="e.g., Marketing, Fitness, Career transition">
                </div>

                <!-- Q2 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">2. What kind of advice do people
                        naturally come to you for?</label>
                    <textarea name="Q2" required rows="2"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="e.g., How to handle difficult conversations, how to organize my day..."></textarea>
                </div>

                <!-- Q3 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">3. How much coaching experience do you
                        have?</label>
                    <select name="Q3" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="Beginner (just starting)">Beginner (just starting)</option>
                        <option value="Intermediate (some clients)">Intermediate (some clients)</option>
                        <option value="Advanced (established practice)">Advanced (established practice)</option>
                    </select>
                </div>

                <!-- Q4 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">4. Who is your ideal client? (Be
                        specific)</label>
                    <input type="text" name="Q4" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="e.g., Introverted female entrepreneurs in their 30s">
                </div>

                <!-- Q5 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">5. What is their #1 problem? (In their
                        exact words)</label>
                    <textarea name="Q5" required rows="2"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="e.g., 'I feel like I'm working 24/7 but making no progress'"></textarea>
                </div>

                <!-- Q6 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">6. What is the one thing they want
                        more than anything else right now?</label>
                    <input type="text" name="Q6" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="e.g., More time with their family without feeling guilty">
                </div>

                <!-- Q7 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">7. Who would you NOT work with? (Who
                        is a bad fit?)</label>
                    <input type="text" name="Q7" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="e.g., People looking for a quick fix or guaranteed ROI in 2 weeks">
                </div>

                <!-- Q8 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">8. How do you want to deliver your
                        coaching?</label>
                    <select name="Q8" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="1-on-1 calls">1-on-1 calls</option>
                        <option value="Group coaching">Group coaching</option>
                        <option value="Course + Slack community">Course + Slack community</option>
                        <option value="Hybrid (1-on-1 + Digital assets)">Hybrid (1-on-1 + Digital assets)</option>
                    </select>
                </div>

                <!-- Q9 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">9. What is the duration of your ideal
                        program?</label>
                    <select name="Q9" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="4 weeks">4 weeks</option>
                        <option value="8 weeks">8 weeks</option>
                        <option value="12 weeks">12 weeks</option>
                        <option value="6 months">6 months</option>
                    </select>
                </div>

                <!-- Q10 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">10. What is your comfortable pricing
                        range?</label>
                    <select name="Q10" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="$100 - $500">$100 - $500</option>
                        <option value="$500 - $2,000">$500 - $2,000</option>
                        <option value="$2,000 - $5,000">$2,000 - $5,000</option>
                        <option value="$5,000+">$5,000+</option>
                    </select>
                </div>

                <!-- Q11 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">11. What is your preferred content
                        medium?</label>
                    <select name="Q11" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="Writing (Articles, newsletters)">Writing (Articles, newsletters)</option>
                        <option value="Video (YouTube, Reels, TikTok)">Video (YouTube, Reels, TikTok)</option>
                        <option value="Audio (Podcasting)">Audio (Podcasting)</option>
                        <option value="Visual (Infographics, Carousels)">Visual (Infographics, Carousels)</option>
                    </select>
                </div>

                <!-- Q12 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">12. Current audience size (total
                        followers/subscribers)?</label>
                    <select name="Q12" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="0 - 500">0 - 500</option>
                        <option value="500 - 2,000">500 - 2,000</option>
                        <option value="2,000 - 10,000">2,000 - 10,000</option>
                        <option value="10,000+">10,000+</option>
                    </select>
                </div>

                <!-- Q13 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">13. What is your biggest fear
                        regarding starting this business?</label>
                    <textarea name="Q13" required rows="2"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="e.g., That nobody will buy and I'll look foolish..."></textarea>
                </div>

                <!-- Q14 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">14. How many hours a week can you
                        realistically commit?</label>
                    <select name="Q14" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="0 - 5 hours">0 - 5 hours</option>
                        <option value="5 - 15 hours">5 - 15 hours</option>
                        <option value="15 - 30 hours">15 - 30 hours</option>
                        <option value="Full-time">Full-time</option>
                    </select>
                </div>

                <!-- Q15 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">15. What is your monthly ad
                        budget?</label>
                    <select name="Q15" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="No budget right now">No budget right now</option>
                        <option value="$100 - $500">$100 - $500</option>
                        <option value="$500 - $2,000">$500 - $2,000</option>
                        <option value="$2,000+">$2,000+</option>
                    </select>
                </div>

                <!-- Q16 -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">16. What does success look like for
                        you in 12 months?</label>
                    <textarea name="Q16" required rows="2"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                        placeholder="e.g., Earning $5k/mo and quit my job..."></textarea>
                </div>
            </div>

            <div class="pt-8 pt-4">
                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 px-6 rounded-xl transition duration-300 transform hover:scale-[1.02] shadow-xl text-xl">
                    Generate My Coaching Business Plan →
                </button>
                <p class="text-center text-xs text-gray-400 mt-4">
                    By submitting, you agree to receive our 5-day strategy sequence. You can unsubscribe at any time.
                </p>
            </div>
        </form>
    </div>

    <footer class="mt-20 text-center text-gray-400 text-sm">
        <p>© 2024 Coaching Business Plan. Built for Coaches.</p>
    </footer>
</body>

</html>
